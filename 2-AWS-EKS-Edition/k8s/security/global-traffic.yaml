# k8s/security/global-traffic.yaml
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: aegis-global-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "aegis.ai"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: aegis-global-routing
spec:
  hosts:
  - "aegis.ai"
  gateways:
  - aegis-global-gateway
  http:
  - route:
    - destination:
        host: mcp-server.default.svc.cluster.local
        subset: v1
      weight: 100
