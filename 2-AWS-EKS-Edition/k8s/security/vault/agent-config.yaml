# k8s/security/vault/agent-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config
  namespace: default
data:
  vault-agent-config.hcl: |
    exit_after_auth = false
    pid_file = "/home/vault/pid"

    auto_auth {
        method "kubernetes" {
            mount_path = "auth/kubernetes"
            config = {
                role = "aegis-app"
            }
        }
    }

    sink "file" {
        config = {
            path = "/home/vault/.vault-token"
        }
    }

    template {
        contents = <<EOH
        {{ with secret "database/creds/aegis-readonly" }}
        export DB_USER="{{ .Data.username }}"
        export DB_PASSWORD="{{ .Data.password }}"
        {{ end }}
        EOH
        destination = "/vault/secrets/db-creds.sh"
    }
