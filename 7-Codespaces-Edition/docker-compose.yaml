version: '3.8'

services:
  milvus:
    image: milvusdb/milvus:v2.3.1
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Control Plane Registry
  model-control-plane:
    build: 
      context: ./apps/model-control-plane
    ports:
      - "8080:80"
    environment:
      - MILVUS_HOST=milvus
    depends_on:
      milvus:
        condition: service_healthy

  # Serving Interface (Mock RAG Logic)
  model-serving-api:
    build: 
      context: ./apps/model-serving-api
    ports:
      - "8081:80"
    environment:
      - MILVUS_HOST=milvus
    depends_on:
      milvus:
        condition: service_healthy

  # MCP Server (JSON-RPC 2.0 / SSE)
  mcp-server:
    build:
      context: ../../mcp-ai-platform/apps/mcp-server
    ports:
      - "8000:8000"
    environment:
      - CONTROL_PLANE_URL=http://model-control-plane:80
    depends_on:
      - model-control-plane

  # Sovereign Failover Controller
  failover-controller:
    build:
      context: ../../mcp-ai-platform/apps/failover-controller
    environment:
      - PRIMARY_API_URL=http://model-control-plane:80
      - SECONDARY_API_URL=http://localhost:8080 # Simulate failover target

  # Interactive UI
  mcp-dashboard:
    build:
      context: ./apps/mcp-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - model-control-plane
      - model-serving-api
