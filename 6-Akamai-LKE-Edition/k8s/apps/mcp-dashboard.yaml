apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-dashboard
  namespace: default
  labels:
    app: mcp-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-dashboard
  template:
    metadata:
      labels:
        app: mcp-dashboard
    spec:
      containers:
      - name: mcp-dashboard
        image: mcp-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-dashboard
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30080
  selector:
    app: mcp-dashboard
